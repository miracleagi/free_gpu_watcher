# 轮询间隔（秒）
poll_interval: 60

# 同一块 GPU 空闲后多久才再次通知（秒），防止轰炸
notify_cooldown: 600

# SSH 超时
ssh_timeout: 10
ssh_connect_timeout: 5

# 空闲判断阈值：显存使用率低于此值即视为空闲
idle_threshold:
  memory_pct: 10        # 显存使用率低于此值(%)即为空闲（剩余90%）

hosts:
  - name: "server-1"
    host: "192.168.1.100"
    user: "yourname"
    port: 22
    key: "~/.ssh/id_rsa"

  - name: "server-2"
    host: "192.168.1.101"
    user: "yourname"
    port: 2222
    key: "~/.ssh/id_rsa"
